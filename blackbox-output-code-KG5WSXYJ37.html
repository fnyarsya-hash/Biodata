<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | Arsya Latief Habibie</title>
    
    <!-- Font Ringan: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- KONFIGURASI DASAR --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --gold: #D4AF37;
            --text-white: #f5f5f5;
            --text-gray: #a0a0a0;
            --spacing: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* --- NAVIGASI --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-weight: 700;
            color: var(--gold);
            font-size: 1.4rem;
            text-decoration: none;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* --- LAYOUT UTAMA --- */
        section {
            padding: var(--spacing) 10%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1.title {
            font-size: 2rem;
            margin-bottom: 3rem;
            color: var(--gold);
        }

        /* --- KARTU BIODATA --- */
        .card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .name {
            font-size: 1.8rem;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        .gender {
            color: var(--text-gray);
            margin-bottom: 25px;
        }

        .grid-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
        }

        .label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .value {
            font-weight: 600;
            font-size: 1rem;
        }

        /* --- GALERI --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: 1px solid var(--gold);
            color: var(--gold);
            background: transparent;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--bg-dark);
        }

        input[type="file"] {
            display: none;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .media-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .media-box img, .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            section { padding: 80px 5%; }
            .grid-data { grid-template-columns: 1fr; }
            .controls { width: 100%; }
            .btn { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- NAVIGASI -->
    <header>
        <a href="#" class="logo">ARSYA.</a>
        <nav>
            <ul>
                <li><a href="#biodata">BioData</a></li>
                <li><a href="#galeri">Galeri Media</a></li>
            </ul>
        </nav>
    </header>

    <!-- BAGIAN 1: BIODATA -->
    <section id="biodata">
        <h1 class="title">Biodata Diri</h1>
        <div class="card">
            <h2 class="name">Arsya Latief Habibie</h2>
            <p class="gender">Laki-Laki</p>

            <div class="grid-data">
                <div class="data-item">
                    <span class="label">Tanggal Lahir</span>
                    <div class="value">23 November 2010</div>
                </div>
                <div class="data-item">
                    <span class="label">Umur</span>
                    <div class="value">15 Tahun</div>
                </div>
                <div class="data-item">
                    <span class="label">Pendidikan</span>
                    <div class="value">Kelas 10 SMA</div>
                </div>
                <div class="data-item">
                    <span class="label">Hobi</span>
                    <div class="value">Bermain Game<br>Belajar Coding</div>
                </div>
            </div>
        </div>
    </section>

    <!-- BAGIAN 2: GALERI MEDIA -->
    <section id="galeri">
        <h1 class="title">Galeri Media</h1>

        <div class="controls">
            <label for="input-foto" class="btn">📷 Upload Foto</label>
            <input type="file" id="input-foto" accept="image/*" multiple onchange="tampilkanFile(this)">

            <label for="input-video" class="btn">🎥 Upload Video</label>
            <input type="file" id="input-video" accept="video/*" multiple onchange="tampilkanFile(this)">
        </div>

        <div class="gallery-grid" id="area-galeri">
            <!-- File akan muncul di sini -->
        </div>
    </section>

    <!-- SCRIPT RINGAN -->
    <script>
        function tampilkanFile(input) {
            const area = document.getElementById('area-galeri');
            const files = input.files;

            if (files) {
                Array.from(files).forEach(file => {
                    // Cek apakah file itu gambar atau video
                    if (file.type.startsWith('image/') || file.type.startsWith('video/')) {
                        
                        // Buat elemen baru (Div)
                        const box = document.createElement('div');
                        box.className = 'media-box';
                        
                        // Buat URL Objek (Pratinjau Instan)
                        const url = URL.createObjectURL(file);

                        if (file.type.startsWith('image/')) {
                            const img = document.createElement('img');
                            img.src = url;
                            box.appendChild(img);
                        } else if (file.type.startsWith('video/')) {
                            const vid = document.createElement('video');
                            vid.src = url;
                            vid.controls = true; // Tampilkan tombol play
                            box.appendChild(vid);
                        }

                        area.appendChild(box);
                    }
                });
            }
            
            // Reset input agar bisa memilih file yang sama lagi jika needed
            input.value = '';
        }
    </script>
</body>
</html>
